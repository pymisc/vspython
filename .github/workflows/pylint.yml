# ==============================================================================
# GitHub Actions Workflow: Python Code Quality & Linting (Pylint)
# 
# Purpose:
#   This workflow automatically analyzes all Python (.py) files in the repository
#   for programming errors, syntax bugs, and code style consistency on every push.
#
# How to troubleshoot if this fails:
#   1. Click on the failed "Analysing the code with pylint" step in GitHub Actions.
#   2. Look for lines starting with 'E' (Errors) to find code bugs.
#   3. Fix the reported issues in your local code, commit, and push again.
# ==============================================================================

name: Pylint

# Trigger this workflow automatically whenever code is pushed to the repository
on: [push]

jobs:
  build:
    name: Lint Python Code
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        # Test against our target Python runtime environment
        python-version: ["3.10"]

    steps:
    # Step 1: Clone the repository's code onto the runner machine
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Set up the correct Python environment
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    # Step 3: Install Pylint and any required third-party libraries (e.g., psutil, Pillow)
    # so Pylint can verify our external module imports successfully.
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint psutil Pillow

    # Step 4: Scan all Python files in the repo.
    # We use '--errors-only' to ignore style warnings/conventions and only fail 
    # the pipeline if there are actual, breaking bugs (like undefined variables or syntax errors).
    - name: Analysing the code with pylint
      run: |
        pylint --errors-only $(git ls-files '*.py')