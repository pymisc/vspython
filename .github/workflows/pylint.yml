name: Pylint

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5 # Upgraded from v3 to v5 to support Node 24 runners
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint psutil Pillow
    - name: Analysing the code with pylint
      run: |
        # --errors-only ensures it only returns a non-zero code for actual code errors
        pylint --errors-only $(git ls-files '*.py')