# ==============================================================================
# GitHub Actions Workflow: Dependency Version Reporter
# 
# Purpose:
#   A manual utility to install the current requirements.txt and print out the
#   exact resolved versions of our top-level packages. Used for freezing versions.
# ==============================================================================

name: Get Package Versions

# workflow_dispatch allows you to trigger this manually from the GitHub UI
on: workflow_dispatch

jobs:
  report-versions:
    name: Check Current Package Versions
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version-file: '.python-version'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Print baseline versions
      run: |
        echo "=== EXACT VERSIONS FOR REQUIREMENTS.TXT ==="
        
        # 1. Read the file requirements.txt and remove all comments (sed 's/#.*//')
        # 2. Strip out any existing version pins if they exist (awk -F '[=<>]')
        # 3. Ignore empty lines and grab the raw package name (awk 'NF{print $1}')
        PACKAGES=$(cat requirements.txt | sed 's/#.*//' | awk -F '[=<>]' '{print $1}' | awk 'NF{print $1}')
        
        # Generate the full freeze list once
        pip freeze > installed_packages.txt
        
        # Loop through our dynamic list and find the exact installed version for each
        for pkg in $PACKAGES; do
          grep -i "^${pkg}==" installed_packages.txt
        done